<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>

<body>
    <header id="page_header">
        <div>
            <div><img src="img/logo.jpeg" alt="Sweet Scoop Ice Cream Logo"></div>
        </div>

        <div>
            <h3>Sweet Scoop Ice Cream</h3>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <main class="login_main">
        <div id="login_container">
            <h2>Welcome Back!</h2>
            <p>Please enter your username to log in.</p>
            <form id="login_form">
                <label for="username">Username:</label><br>
                <input type="text" id="username" name="username" required><br><br>

                <label for="password">Password:</label><br>
                <input type="password" id="password" name="password" required><br><br>
                
                <div>
                    <input type="checkbox" id="forgot_password" name="forgot_password" disabled>
                    <label for="forgot_password">Forgot Password?</label><br><br>
                </div>

                <button type="submit">Login</button>
            </form>
            <div id="login_message"></div>
            <p>
                New user? <a href="signup.html" class="action_btn">Sign Up here</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Sweet Scoop Ice Cream.</p>
    </footer>
    <script>
        const loginForm = document.getElementById('login_form');
        const loginMessage = document.getElementById('login_message');
        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/users');
                const users = await response.json();
                const matchedUser = users.find(
                    u => u.username.toLowerCase() === usernameInput.toLowerCase()
                );
                if (!matchedUser) {
                    showMessage('Username not found.', 'error');
                    return;
                }
                if (matchedUser.email !== passwordInput) {
                    showMessage('Incorrect password.', 'error');
                    return;
                }
                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'menu_view.html';
                }, 2000);
            } catch (err) {
                showMessage('Something went wrong.', 'error');
                console.error(err);
            }
        });
        function showMessage(message, type) {
            loginMessage.textContent = message;
            loginMessage.className = "";
            loginMessage.classList.add("message", type);
            loginMessage.style.display = 'block';
        }
    </script>
</body>

</html>
